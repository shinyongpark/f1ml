data:
  results_csv: "data/raw/results.csv"
  races_csv:   "data/raw/races.csv"

schema:
  year_col: "year"
  target_col: "positionOrder"

model:
  kind: "xgb"
  params:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 5
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42

eval:
  topk: 3
  cross_validate: false
  cv_splits: 5

output_dir: "artifacts"
